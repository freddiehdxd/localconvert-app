name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust_targets: 'aarch64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            rust_targets: ''
          - platform: 'windows-latest'
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'LocalConvert ${{ github.ref_name }}'
          releaseBody: |
            ## What's New
            See the [commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.

            ## Downloads
            - **Windows**: Download the `.exe` installer (recommended) or `.msi`
            - **macOS**: Download the `.dmg` file (universal — works on both Apple Silicon and Intel)
            - **Linux**: Download the `.AppImage` (universal) or `.deb` (Debian/Ubuntu)

            ## External Tools
            LocalConvert requires external tools for some conversions:
            - FFmpeg (video/audio)
            - ImageMagick (images)
            - LibreOffice (documents)
            - Pandoc (markdown)
            - Ghostscript (PDF)
            - Tesseract (OCR)
            - 7-Zip (archives)

            The app will guide you through installing any missing tools.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
